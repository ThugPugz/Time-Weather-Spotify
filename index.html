<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XENEON EDGE Dashboard</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;

    font-family: "Segoe UI", sans-serif;
    color: white;

    background: #000;

    display: flex;
    justify-content: center;
    align-items: center;
}

   
.widget {
    width: 100%;
    height: 100%;

    background: transparent;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    gap: 35px;

    padding: 20px;
}

.clock {
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 8px;
}

.time {
    font-size: 72px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -3px;
}

.ampm {
    font-size: 22px;
    font-weight: 700;
    opacity: .8;
}    


.weather {
    text-align: center;
}

.temp {
    font-size: 30px;
    font-weight: 600;
}

.condition {
    font-size: 14px;
    opacity: 0.85;
}

.spotify {
    display: flex;
    justify-content: center;
}

.spotify-btn {
    width: 72px;
    height: 72px;

    border: none;
    border-radius: 50%;

    background: #1DB954;
    color: white;

    font-size: 28px;
    cursor: pointer;

    transition: transform .2s;
}

.spotify-btn:hover {
    transform: scale(1.08);
}
</style>
</head>

<body>

<div class="widget">

    <div class="clock">
        <span id="time" class="time">00:00</span>
        <span id="ampm" class="ampm">AM</span>
    </div>

    <div class="weather">
        <div id="temp" class="temp">--°</div>
        <div id="condition" class="condition">
            Loading weather...
        </div>
    </div>

    <div class="spotify">
        <button class="spotify-btn" id="spotifyBtn">
            ▶
        </button>
    </div>

</div>

<script>
// CLOCK
document.getElementById("condition").textContent =
    "SCRIPT RUNNING";
setInterval(updateClock, 1000);
updateClock();
function updateClock() {
    const now = new Date();

    const timeString = now.toLocaleTimeString([], {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
    });

    const [time, ampm] = timeString.split(' ');

    document.getElementById('time').textContent = time;
    document.getElementById('ampm').textContent = ampm;
}


// WEATHER
// WEATHER
const WEATHER_API_KEY =
    "d9fb0d09df7205e25b09a79143da5aec";

function loadWeather() {

    const LAT = 43.0760;
    const LON = -107.2903;

    fetch(
        `https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&units=imperial&appid=${WEATHER_API_KEY}`
    )
    .then(r => r.json())
    .then(data => {

        document.getElementById("temp").textContent =
            Math.round(data.main.temp) + "°";

        document.getElementById("condition").textContent =
            data.weather[0].main;

    })
    .catch(err => {

        document.getElementById("temp").textContent = "ERR";
        document.getElementById("condition").textContent =
            err.toString();

    });

}

loadWeather();
setInterval(loadWeather, 300000);
// SPOTIFY PKCE

const CLIENT_ID =
    "9ee2a1081a034f7bb99790c9f15ce422";

const REDIRECT_URI =
    "https://thugpugz.github.io/Time-Weather-Spotify/";

const SCOPES =
    "user-read-playback-state user-modify-playback-state user-read-currently-playing";

let isPlaying = false;

function generateRandomString(length) {

    const chars =
        "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

    let result = "";

    for (let i = 0; i < length; i++) {
        result += chars.charAt(
            Math.floor(Math.random() * chars.length)
        );
    }

    return result;
}

async function sha256(plain) {

    const encoder = new TextEncoder();

    const data = encoder.encode(plain);

    return await crypto.subtle.digest(
        "SHA-256",
        data
    );
}

function base64urlencode(buffer) {

    return btoa(
        String.fromCharCode(...new Uint8Array(buffer))
    )
        .replace(/\+/g, "-")
        .replace(/\//g, "_")
        .replace(/=/g, "");
}

async function loginSpotify() {

    const verifier =
        generateRandomString(128);

    localStorage.setItem(
        "spotify_verifier",
        verifier
    );

    const challenge =
        base64urlencode(
            await sha256(verifier)
        );

    const params =
        new URLSearchParams({
            client_id: CLIENT_ID,
            response_type: "code",
            redirect_uri: REDIRECT_URI,
            scope: SCOPES,
            code_challenge_method: "S256",
            code_challenge: challenge
        });

    window.location =
        "https://accounts.spotify.com/authorize?"
        + params.toString();
}

async function exchangeCodeForToken() {

    const code =
        new URLSearchParams(
            window.location.search
        ).get("code");

    if (!code) return;

    const verifier =
        localStorage.getItem(
            "spotify_verifier"
        );

    const response =
        await fetch(
            "https://accounts.spotify.com/api/token",
            {
                method: "POST",
                headers: {
                    "Content-Type":
                        "application/x-www-form-urlencoded"
                },
                body: new URLSearchParams({
                    client_id: CLIENT_ID,
                    grant_type: "authorization_code",
                    code,
                    redirect_uri: REDIRECT_URI,
                    code_verifier: verifier
                })
            }
        );

    const data =
        await response.json();

    console.log(data);

    localStorage.setItem(
        "spotify_access_token",
        data.access_token
    );

    window.history.replaceState(
        {},
        document.title,
        REDIRECT_URI
    );
}

exchangeCodeForToken();

async function toggleSpotify() {

    const token =
        localStorage.getItem(
            "spotify_access_token"
        );

    if (!token) {

        await loginSpotify();
        return;
    }

    const endpoint =
        isPlaying
            ? "pause"
            : "play";

    const response =
        await fetch(
            `https://api.spotify.com/v1/me/player/${endpoint}`,
            {
                method: "PUT",
                headers: {
                    Authorization:
                        `Bearer ${token}`
                }
            }
        );

    console.log(
        "Spotify:",
        response.status
    );

    if (
        response.ok ||
        response.status === 204
    ) {

        isPlaying = !isPlaying;

        document.getElementById(
            "spotifyBtn"
        ).textContent =
            isPlaying
                ? "❚❚"
                : "▶";
    }
}

document
    .getElementById("spotifyBtn")
    .addEventListener(
        "click",
        toggleSpotify
    );

</script>

</body>
</html>
