<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XENEON EDGE Dashboard</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;

    font-family: "Segoe UI", sans-serif;
    color: white;

    background:
        linear-gradient(135deg,
            #3b82f6,
            #8b5cf6,
            #ec4899);

    display: flex;
    justify-content: center;
    align-items: center;
}

.widget {
    width: 100%;
    height: 100%;

    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.12);

    border-radius: 24px;

    display: flex;
    flex-direction: column;
    justify-content: space-between;

    padding: 20px;
}

.clock {
    text-align: center;
}

.time {
    font-size: 42px;
    font-weight: 700;
}

.date {
    font-size: 14px;
    opacity: 0.8;
}

.weather {
    text-align: center;
}

.temp {
    font-size: 30px;
    font-weight: 600;
}

.condition {
    font-size: 14px;
    opacity: 0.85;
}

.spotify {
    display: flex;
    justify-content: center;
}

.spotify-btn {
    width: 72px;
    height: 72px;

    border: none;
    border-radius: 50%;

    background: #1DB954;
    color: white;

    font-size: 28px;
    cursor: pointer;

    transition: transform .2s;
}

.spotify-btn:hover {
    transform: scale(1.08);
}
</style>
</head>

<body>

<div class="widget">

    <div class="clock">
        <div id="time" class="time">00:00</div>
        <div id="date" class="date">Loading...</div>
    </div>

    <div class="weather">
        <div id="temp" class="temp">--°</div>
        <div id="condition" class="condition">Loading weather...</div>
    </div>

    <div class="spotify">
        <button class="spotify-btn" id="spotifyBtn">
            ▶
        </button>
    </div>

</div>

<script>
// CLOCK
function updateClock() {
    const now = new Date();

    document.getElementById("time").textContent =
        now.toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit'
        });

    document.getElementById("date").textContent =
        now.toLocaleDateString([], {
            weekday: 'long',
            month: 'short',
            day: 'numeric'
        });
}

setInterval(updateClock, 1000);
updateClock();


// WEATHER
const WEATHER_API_KEY = "YOUR_OPENWEATHERMAP_KEY";
const CITY = "Grand Rapids";

async function loadWeather() {
    try {
        const response = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${CITY}&units=imperial&appid=${WEATHER_API_KEY}`
        );

        const data = await response.json();

        document.getElementById("temp").textContent =
            `${Math.round(data.main.temp)}°F`;

        document.getElementById("condition").textContent =
            data.weather[0].main;
    }
    catch (e) {
        document.getElementById("condition").textContent =
            "Weather unavailable";
    }
}

loadWeather();
setInterval(loadWeather, 600000);


// SPOTIFY
const SPOTIFY_TOKEN = "YOUR_SPOTIFY_ACCESS_TOKEN";

let isPlaying = false;

async function toggleSpotify() {

    const endpoint = isPlaying
        ? "pause"
        : "play";

    await fetch(
        `https://api.spotify.com/v1/me/player/${endpoint}`,
        {
            method: "PUT",
            headers: {
                Authorization: `Bearer ${SPOTIFY_TOKEN}`
            }
        }
    );

    isPlaying = !isPlaying;

    document.getElementById("spotifyBtn").innerHTML =
        isPlaying ? "❚❚" : "▶";
}

document
    .getElementById("spotifyBtn")
    .addEventListener("click", toggleSpotify);

</script>

</body>
</html>
