<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XENEON EDGE Dashboard</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;

    font-family: "Segoe UI", sans-serif;
    color: white;

    background:
linear-gradient(
    180deg,
    #1e293b 0%,
    #0f172a 100%
);

    display: flex;
    justify-content: center;
    align-items: center;
}
   
.widget {
    width: 100%;
    height: 100%;

    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.12);

    border-radius: 24px;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    gap: 35px;

    padding: 20px;
}

.clock {
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 8px;
}

.time {
    font-size: 72px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -3px;
}

.ampm {
    font-size: 22px;
    font-weight: 700;
    opacity: .8;
}    


.weather {
    text-align: center;
}

.temp {
    font-size: 30px;
    font-weight: 600;
}

.condition {
    font-size: 14px;
    opacity: 0.85;
}

.spotify {
    display: flex;
    justify-content: center;
}

.spotify-btn {
    width: 72px;
    height: 72px;

    border: none;
    border-radius: 50%;

    background: #1DB954;
    color: white;

    font-size: 28px;
    cursor: pointer;

    transition: transform .2s;
}

.spotify-btn:hover {
    transform: scale(1.08);
}
</style>
</head>

<body>

<div class="widget">

    <div class="clock">
        <span id="time" class="time">00:00</span>
        <span id="ampm" class="ampm">AM</span>
    </div>

    <div class="weather">
        <div id="temp" class="temp">--°</div>
        <div id="condition" class="condition">
            Loading weather...
        </div>
    </div>

    <div class="spotify">
        <button class="spotify-btn" id="spotifyBtn">
            ▶
        </button>
    </div>

</div>

<script>
// CLOCK

setInterval(updateClock, 1000);
updateClock();
function updateClock() {
    const now = new Date();

    const timeString = now.toLocaleTimeString([], {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
    });

    const [time, ampm] = timeString.split(' ');

    document.getElementById('time').textContent = time;
    document.getElementById('ampm').textContent = ampm;
}


// WEATHER
// WEATHER
const WEATHER_API_KEY = "YOUR_OPENWEATHERMAP_KEY";

async function loadWeather() {
    if (!navigator.geolocation) {
        document.getElementById("condition").textContent =
            "Location unavailable";
        return;
    }

    navigator.geolocation.getCurrentPosition(
        async (position) => {
            try {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=imperial&appid=${WEATHER_API_KEY}`
                );

                const data = await response.json();

                document.getElementById("temp").textContent =
                    `${Math.round(data.main.temp)}°F`;

                document.getElementById("condition").textContent =
                    data.weather[0].main;
            }
            catch (e) {
                document.getElementById("condition").textContent =
                    "Weather unavailable";
            }
        },
        () => {
            document.getElementById("condition").textContent =
                "Location denied";
        }
    );
}

loadWeather();
setInterval(loadWeather, 600000);


// SPOTIFY
const SPOTIFY_TOKEN = "YOUR_SPOTIFY_ACCESS_TOKEN";

let isPlaying = false;

async function toggleSpotify() {

    const endpoint = isPlaying
        ? "pause"
        : "play";

    await fetch(
        `https://api.spotify.com/v1/me/player/${endpoint}`,
        {
            method: "PUT",
            headers: {
                Authorization: `Bearer ${SPOTIFY_TOKEN}`
            }
        }
    );

    isPlaying = !isPlaying;

    document.getElementById("spotifyBtn").innerHTML =
        isPlaying ? "❚❚" : "▶";
}

document
    .getElementById("spotifyBtn")
    .addEventListener("click", toggleSpotify);

</script>

</body>
</html>
